name: CI/CD

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: |
          mkdir -p coverage
          uv run coverage run --source=src/calendar_prioritizer -m pytest
          uv run coverage lcov -o coverage/lcov.info
          uv run coverage report

      - name: Check coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 80
          exclude: '**/**/__init__.py src/calendar_prioritizer/tests/**'

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build wheel
        run: uv build

      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        id: doppler
        with:
          doppler-token: ${{ secrets.DOPPLER_GH_SERVICE_TOKEN }}

      - name: Validate Docker credentials
        env:
          DOCKER_USERNAME: ${{ steps.doppler.outputs.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ steps.doppler.outputs.DOCKER_PASSWORD }}
        run: |
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "Doppler did not provide DOCKER_USERNAME."
            exit 1
          fi

          if [ -z "$DOCKER_PASSWORD" ]; then
            echo "Doppler did not provide DOCKER_PASSWORD."
            exit 1
          fi

          case "$DOCKER_USERNAME" in
            *[[:space:]]*)
              echo "DOCKER_USERNAME contains whitespace. Use the Docker ID, not an email address or display name."
              exit 1
              ;;
          esac

          case "$DOCKER_PASSWORD" in
            *$'\n'*|*$'\r'*)
              echo "DOCKER_PASSWORD contains a newline. Store the raw Docker Hub access token without extra line breaks."
              exit 1
              ;;
          esac

      - name: Configure Docker image name
        env:
          DOCKER_USERNAME: ${{ steps.doppler.outputs.DOCKER_USERNAME }}
          DOCKER_IMAGE: ${{ steps.doppler.outputs.DOCKER_IMAGE }}
        run: |
          if [ -z "$DOCKER_IMAGE" ] && [ -z "$DOCKER_USERNAME" ]; then
            echo "Set DOCKER_IMAGE or DOCKER_USERNAME in Doppler."
            exit 1
          fi

          if [ -n "$DOCKER_IMAGE" ]; then
            echo "IMAGE_NAME=$DOCKER_IMAGE" >> "$GITHUB_ENV"
          else
            echo "IMAGE_NAME=$DOCKER_USERNAME/calendar-prioritizer" >> "$GITHUB_ENV"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.doppler.outputs.DOCKER_USERNAME }}
          password: ${{ steps.doppler.outputs.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build --no-cache \
            --tag "$IMAGE_NAME:latest" \
            --tag "$IMAGE_NAME:${GITHUB_SHA}" \
            .

      - name: Push Docker image
        run: |
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:${GITHUB_SHA}"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v1.2.0
        id: doppler
        with:
          doppler-token: ${{ secrets.DOPPLER_GH_SERVICE_TOKEN }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        env:
          DOCKER_USERNAME: ${{ steps.doppler.outputs.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ steps.doppler.outputs.DOCKER_PASSWORD }}
          DOCKER_IMAGE: ${{ steps.doppler.outputs.DOCKER_IMAGE }}
          SESSION_SECRET: ${{ steps.doppler.outputs.SESSION_SECRET }}
          GOOGLE_CLIENT_ID: ${{ steps.doppler.outputs.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ steps.doppler.outputs.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ steps.doppler.outputs.GOOGLE_REDIRECT_URI }}
          GOOGLE_OAUTH_SUCCESS_REDIRECT: ${{ steps.doppler.outputs.GOOGLE_OAUTH_SUCCESS_REDIRECT }}
          GOOGLE_SCOPES: ${{ steps.doppler.outputs.GOOGLE_SCOPES }}
          DATABASE_URL: ${{ steps.doppler.outputs.DATABASE_URL }}
          SESSION_COOKIE_HTTPS_ONLY: ${{ steps.doppler.outputs.SESSION_COOKIE_HTTPS_ONLY }}
          APP_DOMAIN: ${{ steps.doppler.outputs.APP_DOMAIN }}
          ACME_EMAIL: ${{ steps.doppler.outputs.ACME_EMAIL }}
        with:
          host: ${{ steps.doppler.outputs.AWS_IP }}
          username: ${{ steps.doppler.outputs.AWS_EC2_USERNAME }}
          key: ${{ steps.doppler.outputs.SSH_AWS_PEM }}
          envs: DOCKER_USERNAME,DOCKER_PASSWORD,DOCKER_IMAGE,SESSION_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI,GOOGLE_OAUTH_SUCCESS_REDIRECT,GOOGLE_SCOPES,DATABASE_URL,SESSION_COOKIE_HTTPS_ONLY,APP_DOMAIN,ACME_EMAIL
          script: |
            if [ -z "$DOCKER_USERNAME" ]; then
              echo "Doppler did not provide DOCKER_USERNAME."
              exit 1
            fi

            if [ -z "$DOCKER_PASSWORD" ]; then
              echo "Doppler did not provide DOCKER_PASSWORD."
              exit 1
            fi

            if [ -z "$GOOGLE_CLIENT_ID" ]; then
              echo "Doppler did not provide GOOGLE_CLIENT_ID."
              exit 1
            fi

            if [ -z "$GOOGLE_CLIENT_SECRET" ]; then
              echo "Doppler did not provide GOOGLE_CLIENT_SECRET."
              exit 1
            fi

            if [ -z "$GOOGLE_REDIRECT_URI" ]; then
              echo "Doppler did not provide GOOGLE_REDIRECT_URI."
              exit 1
            fi

            if [ -z "$APP_DOMAIN" ]; then
              echo "Doppler did not provide APP_DOMAIN. Set it to your HTTPS domain, for example app.example.com."
              exit 1
            fi

            case "$APP_DOMAIN" in
              http://*|https://*|*/*|*:*)
                echo "APP_DOMAIN must be only the hostname, without scheme, path, or port."
                exit 1
                ;;
            esac

            if [ "$GOOGLE_REDIRECT_URI" != "https://$APP_DOMAIN/api/auth/google/callback" ]; then
              echo "GOOGLE_REDIRECT_URI must be https://$APP_DOMAIN/api/auth/google/callback for HTTPS login."
              exit 1
            fi

            if [ -n "$GOOGLE_OAUTH_SUCCESS_REDIRECT" ] && [ "$GOOGLE_OAUTH_SUCCESS_REDIRECT" != "https://$APP_DOMAIN/" ]; then
              echo "GOOGLE_OAUTH_SUCCESS_REDIRECT must be https://$APP_DOMAIN/ for HTTPS login."
              exit 1
            fi

            if [ -n "$SESSION_COOKIE_HTTPS_ONLY" ] && [ "$SESSION_COOKIE_HTTPS_ONLY" != "true" ]; then
              echo "SESSION_COOKIE_HTTPS_ONLY must be true for HTTPS-only deployment."
              exit 1
            fi

            IMAGE_NAME="${DOCKER_IMAGE:-$DOCKER_USERNAME/calendar-prioritizer}"

            if [ -z "$IMAGE_NAME" ]; then
              echo "Set DOCKER_IMAGE or DOCKER_USERNAME in Doppler."
              exit 1
            fi

            echo "$DOCKER_PASSWORD" | sudo docker login --username "$DOCKER_USERNAME" --password-stdin
            sudo docker volume create calendar-prioritizer-data
            sudo docker volume create calendar-prioritizer-caddy-data
            sudo docker volume create calendar-prioritizer-caddy-config
            sudo docker network create calendar-prioritizer-net || true
            sudo systemctl stop nginx || true
            sudo systemctl disable nginx || true
            sudo docker rm -f calendar-prioritizer || true
            sudo docker rm -f calendar-prioritizer-proxy || true
            sudo docker pull "$IMAGE_NAME:latest"
            sudo docker pull caddy:2-alpine

            ENV_FILE="$(mktemp)"
            chmod 600 "$ENV_FILE"
            printf 'SESSION_SECRET=%s\n' "$SESSION_SECRET" >> "$ENV_FILE"
            printf 'GOOGLE_CLIENT_ID=%s\n' "$GOOGLE_CLIENT_ID" >> "$ENV_FILE"
            printf 'GOOGLE_CLIENT_SECRET=%s\n' "$GOOGLE_CLIENT_SECRET" >> "$ENV_FILE"
            printf 'GOOGLE_REDIRECT_URI=%s\n' "$GOOGLE_REDIRECT_URI" >> "$ENV_FILE"

            if [ -n "$GOOGLE_OAUTH_SUCCESS_REDIRECT" ]; then
              printf 'GOOGLE_OAUTH_SUCCESS_REDIRECT=%s\n' "$GOOGLE_OAUTH_SUCCESS_REDIRECT" >> "$ENV_FILE"
            fi

            if [ -n "$GOOGLE_SCOPES" ]; then
              printf 'GOOGLE_SCOPES=%s\n' "$GOOGLE_SCOPES" >> "$ENV_FILE"
            fi

            if [ -n "$DATABASE_URL" ]; then
              printf 'DATABASE_URL=%s\n' "$DATABASE_URL" >> "$ENV_FILE"
            fi

            printf 'SESSION_COOKIE_HTTPS_ONLY=true\n' >> "$ENV_FILE"

            sudo mkdir -p /opt/calendar-prioritizer

            if [ -n "$ACME_EMAIL" ]; then
              sudo tee /opt/calendar-prioritizer/Caddyfile >/dev/null <<EOF
            {
              email $ACME_EMAIL
            }

            $APP_DOMAIN {
              header Strict-Transport-Security "max-age=31536000"
              reverse_proxy calendar-prioritizer:80
            }
            EOF
            else
              sudo tee /opt/calendar-prioritizer/Caddyfile >/dev/null <<EOF
            $APP_DOMAIN {
              header Strict-Transport-Security "max-age=31536000"
              reverse_proxy calendar-prioritizer:80
            }
            EOF
            fi

            sudo docker run -d --name calendar-prioritizer \
              --restart unless-stopped \
              --network calendar-prioritizer-net \
              -v calendar-prioritizer-data:/data \
              --env-file "$ENV_FILE" \
              "$IMAGE_NAME:latest"

            sudo docker run -d --name calendar-prioritizer-proxy \
              --restart unless-stopped \
              --network calendar-prioritizer-net \
              -p 80:80 \
              -p 443:443 \
              -v /opt/calendar-prioritizer/Caddyfile:/etc/caddy/Caddyfile:ro \
              -v calendar-prioritizer-caddy-data:/data \
              -v calendar-prioritizer-caddy-config:/config \
              caddy:2-alpine

            rm -f "$ENV_FILE"
